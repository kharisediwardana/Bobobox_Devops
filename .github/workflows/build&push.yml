name: Build & Push Docker Compose App

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & push
      - name: Build & Push Docker Compose
        run: |
          cd docker
          docker-compose build
          docker tag bobobox-app ${{ secrets.DOCKER_USERNAME }}/bobobox-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/bobobox-app:latest
