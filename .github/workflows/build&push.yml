name: Build & Push Docker Compose App

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate version tag
        id: version
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & Push Docker Image
        run: |
          cd docker
          docker compose build
          docker tag kewtz9/bobobox-app:latest kewtz9/bobobox-app:${{ steps.version.outputs.TAG }}
          docker push kewtz9/bobobox-app:latest
          docker push kewtz9/bobobox-app:${{ steps.version.outputs.TAG }}
